<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynamic Background - Kleurstroom</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #000; position: relative; font-family: sans-serif; }
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; display: block; touch-action: none; cursor: crosshair; }
        #info {
            position: fixed; top: 12px; left: 12px; color: #fff; font-family: monospace; font-size: 12px;
            background: rgba(0,0,0,0.4); padding: 8px 11px; border-radius: 6px; z-index: 1000; line-height: 1.5; pointer-events: none;
        }
        #tools {
            position: fixed; top: 12px; right: 12px; z-index: 1000; display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
        }
        .panel {
            background: rgba(0,0,0,0.5); padding: 6px 9px; border-radius: 8px; color: #fff; font-size: 12px;
            display: flex; align-items: center; gap: 8px;
        }
        .panel label { display: flex; align-items: center; gap: 4px; }
        .panel button { border: none; border-radius: 6px; padding: 5px 9px; font-size: 12px; color: #fff; background: #3a4356; cursor: pointer; }
        input[type=range] { width: 80px; }
        #palette {
            position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 6px; z-index: 1000; background: rgba(0,0,0,0.5); padding: 7px; border-radius: 10px;
        }
        #palette button {
            border: 2px solid transparent; border-radius: 7px; padding: 7px 11px; font-size: 12px; color: #fff; cursor: pointer; min-width: 60px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.6);
        }
        #palette button.active { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.25); }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="info">
        <div>Kleurstroom</div>
        <div>Teken — kleuren stromen en mengen</div>
    </div>

    <div id="tools">
        <div class="panel">
            <label><input type="checkbox" id="rainbow" checked> Regenboog</label>
            <input type="range" id="hue" min="0" max="360" value="200">
        </div>
        <div class="panel">
            <label>Borstel <input type="range" id="brush" min="1" max="16" value="6"></label>
            <label>Mengen <input type="range" id="mix" min="0" max="100" value="22"></label>
        </div>
        <div class="panel">
            <label>Drift <input type="range" id="drift" min="0" max="100" value="35"></label>
            <label>Slosh <input type="range" id="slosh" min="0" max="100" value="35"></label>
            <button id="pauseBtn">⏸</button>
            <button id="clearBtn">🗑</button>
        </div>
    </div>

    <div id="palette"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const paletteEl = document.getElementById('palette');

        // abstracte elementen
        const EMPTY=0, POWDER=1, FLUID=2, MIST=3, SOLID=4;
        const dens=[]; dens[EMPTY]=0; dens[POWDER]=3; dens[FLUID]=2; dens[MIST]=-1; dens[SOLID]=99;
        const MATERIALS = [
            { id: POWDER, label: 'Zand',      css: '#d36cff' },
            { id: FLUID,  label: 'Vloeistof', css: '#2ad0ff' },
            { id: MIST,   label: 'Nevel',     css: '#7affc0' },
            { id: SOLID,  label: 'Vast',      css: '#ffa84a' },
            { id: EMPTY,  label: 'Gum',       css: '#222a38' }
        ];
        let current = POWDER;

        const CELL = 4;
        let cols, rows, N, W, H, DPR;
        let grid, hue, hue2, life, moved;
        let off, offCtx, img, data;

        // sin/cos tabellen voor circulair kleurmengen (hue 0..255)
        const SIN=new Float32Array(256), COS=new Float32Array(256);
        for (let h=0;h<256;h++){ const a=h/256*Math.PI*2; SIN[h]=Math.sin(a); COS[h]=Math.cos(a); }

        function setup() {
            DPR = Math.min(window.devicePixelRatio || 1, 2);
            W = window.innerWidth; H = window.innerHeight;
            canvas.width = W*DPR; canvas.height = H*DPR;
            canvas.style.width = W+'px'; canvas.style.height = H+'px';
            ctx.setTransform(DPR,0,0,DPR,0,0);

            cols = Math.floor(W/CELL); rows = Math.floor(H/CELL); N = cols*rows;
            grid=new Uint8Array(N); hue=new Uint8Array(N); hue2=new Uint8Array(N);
            life=new Uint8Array(N); moved=new Uint8Array(N);

            off=document.createElement('canvas'); off.width=cols; off.height=rows;
            offCtx=off.getContext('2d');
            img=offCtx.createImageData(cols,rows); data=img.data;
        }
        setup();
        window.addEventListener('resize', setup);

        function swap(i,j){
            const tg=grid[i],th=hue[i],tl=life[i];
            grid[i]=grid[j];hue[i]=hue[j];life[i]=life[j];
            grid[j]=tg;hue[j]=th;life[j]=tl;
            moved[i]=1; moved[j]=1;
        }

        // ---------- beweging ----------
        function canInto(d,t){ if(t===EMPTY)return true; if(t===SOLID)return false; return dens[t]<d; }
        function canRise(d,t){ if(t===EMPTY)return true; if(t===SOLID)return false; return dens[t]>d; }

        let frame=0, sloshAmt=0.35;
        function simulate() {
            moved.fill(0);
            const tilt = Math.sin(frame*0.012) * sloshAmt;   // zachte slosh
            const tiltDir = tilt>0?1:-1;
            const tiltMag = Math.abs(tilt);
            for (let y=rows-1;y>=0;y--) {
                const ltr=((y+frame)&1)===0;
                for (let k=0;k<cols;k++) {
                    const x=ltr?k:cols-1-k;
                    const i=y*cols+x;
                    if (moved[i]) continue;
                    const m=grid[i];
                    if (m===POWDER) fall(x,y,i,POWDER,tiltDir,tiltMag,false);
                    else if (m===FLUID) fall(x,y,i,FLUID,tiltDir,tiltMag,true);
                    else if (m===MIST) rise(x,y,i);
                }
            }
        }
        function fall(x,y,i,m,tiltDir,tiltMag,liquid){
            const d=dens[m];
            if (y+1<rows){
                const b=i+cols;
                if (canInto(d,grid[b])){ swap(i,b); return; }
                // diagonaal, voorkeur in slosh-richting
                const first = (Math.random()<0.5+tiltMag*0.5)?tiltDir:-tiltDir;
                for (const dx of [first,-first]){ if(x+dx<0||x+dx>=cols)continue; if(canInto(d,grid[b+dx])){swap(i,b+dx);return;} }
            }
            if (liquid){
                const first = (Math.random()<0.5+tiltMag*0.5)?tiltDir:-tiltDir;
                for (const dx of [first,-first]){ if(x+dx<0||x+dx>=cols)continue; if(canInto(d,grid[i+dx])){swap(i,i+dx);return;} }
            }
        }
        function rise(x,y,i){
            const d=dens[MIST];
            life[i]++;
            if (life[i]>200){ grid[i]=EMPTY; return; }
            if (y>0){
                const u=i-cols;
                if (canRise(d,grid[u])){ swap(i,u); return; }
                const dir=Math.random()<0.5?-1:1;
                for (const dx of [dir,-dir]){ if(x+dx<0||x+dx>=cols)continue; if(canRise(d,grid[u+dx])){swap(i,u+dx);return;} }
            }
            if (Math.random()<0.3){ const dx=Math.random()<0.5?-1:1; if(x+dx>=0&&x+dx<cols&&grid[i+dx]===EMPTY)swap(i,i+dx); }
        }

        // ---------- levende kleur: meng naar buren ----------
        let mixAmt=0.22;
        function blendColors(){
            if (mixAmt<=0.001){ return; }
            for (let y=0;y<rows;y++) for (let x=0;x<cols;x++){
                const i=y*cols+x;
                if (grid[i]===EMPTY){ continue; }
                let sx=SIN[hue[i]], sy=COS[hue[i]], cnt=1;
                if (x>0 && grid[i-1]) { sx+=SIN[hue[i-1]]; sy+=COS[hue[i-1]]; cnt++; }
                if (x<cols-1 && grid[i+1]) { sx+=SIN[hue[i+1]]; sy+=COS[hue[i+1]]; cnt++; }
                if (y>0 && grid[i-cols]) { sx+=SIN[hue[i-cols]]; sy+=COS[hue[i-cols]]; cnt++; }
                if (y<rows-1 && grid[i+cols]) { sx+=SIN[hue[i+cols]]; sy+=COS[hue[i+cols]]; cnt++; }
                if (cnt===1){ hue2[i]=hue[i]; continue; }
                let target = Math.atan2(sx, sy) / (Math.PI*2) * 256;
                if (target<0) target+=256;
                // kortste weg naar target
                let diff = target - hue[i];
                if (diff>128) diff-=256; else if (diff<-128) diff+=256;
                let nh = hue[i] + diff*mixAmt;
                nh = ((nh%256)+256)%256;
                hue2[i]=nh|0;
            }
            // terugschrijven (alleen gevulde cellen)
            for (let i=0;i<N;i++) if (grid[i]!==EMPTY) hue[i]=hue2[i];
        }

        // ---------- render ----------
        let driftAcc=0, driftAmt=0.35;
        function hsv(h,s,v){ // h 0..1
            const i=Math.floor(h*6), f=h*6-i, p=v*(1-s), q=v*(1-f*s), t=v*(1-(1-f)*s);
            let r,g,b;
            switch(i%6){ case 0:r=v;g=t;b=p;break; case 1:r=q;g=v;b=p;break; case 2:r=p;g=v;b=t;break;
                case 3:r=p;g=q;b=v;break; case 4:r=t;g=p;b=v;break; default:r=v;g=p;b=q; }
            return [r*255,g*255,b*255];
        }
        function render(){
            driftAcc=(driftAcc+driftAmt)%256;
            const dr=driftAcc;
            for (let i=0;i<N;i++){
                const m=grid[i];
                const p=i*4;
                if (m===EMPTY){ data[p]=0;data[p+1]=0;data[p+2]=0;data[p+3]=255; continue; }
                let dh=(hue[i]+dr); if(dh>=256)dh-=256;
                let v = m===MIST ? 0.45*Math.min(1,life[i]<200?(1-life[i]/260):0.2) + 0.25
                      : m===SOLID ? 0.55 : 0.72;
                const s = m===FLUID ? 0.85 : m===MIST ? 0.7 : 0.9;
                const [r,g,b]=hsv(dh/256, s, v);
                data[p]=r; data[p+1]=g; data[p+2]=b; data[p+3]=255;
            }
            offCtx.putImageData(img,0,0);
            // zachte, gloeiende look: smoothing aan + additieve bloom
            ctx.globalCompositeOperation='source-over';
            ctx.imageSmoothingEnabled=true;
            ctx.clearRect(0,0,W,H);
            ctx.drawImage(off,0,0,W,H);
            ctx.globalCompositeOperation='lighter';
            ctx.globalAlpha=0.5; ctx.drawImage(off,0,0,W,H);
            ctx.globalAlpha=0.35; ctx.drawImage(off,-CELL*2,-CELL*2,W+CELL*4,H+CELL*4);
            ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
        }

        // ---------- input ----------
        let painting=false, px=0, py=0, brush=6;
        let rainbow=true, hueVal=200, drawHue=0;
        function pos(e){ const t=e.touches?e.touches[0]:e; return {x:t.clientX,y:t.clientY}; }
        function paint(){
            const gx=Math.floor(px/CELL), gy=Math.floor(py/CELL);
            const baseH = rainbow ? drawHue : (hueVal/360*256);
            for (let dy=-brush;dy<=brush;dy++) for (let dx=-brush;dx<=brush;dx++){
                if (dx*dx+dy*dy>brush*brush) continue;
                const x=gx+dx, y=gy+dy;
                if (x<0||x>=cols||y<0||y>=rows) continue;
                const i=y*cols+x;
                if (current===EMPTY){ grid[i]=EMPTY; life[i]=0; continue; }
                const fluidLike = current===POWDER||current===FLUID||current===MIST;
                if (fluidLike && grid[i]!==EMPTY && Math.random()<0.5) continue;
                grid[i]=current;
                hue[i]=((baseH + (Math.random()*16-8))%256+256)%256 | 0;
                if (current===MIST) life[i]=0;
            }
        }
        function onDown(e){ painting=true; const p=pos(e); px=p.x; py=p.y; paint(); e.preventDefault(); }
        function onMove(e){ const p=pos(e); px=p.x; py=p.y; if(painting){ paint(); e.preventDefault(); } }
        function onUp(){ painting=false; }
        canvas.addEventListener('mousedown',onDown);
        window.addEventListener('mousemove',onMove);
        window.addEventListener('mouseup',onUp);
        canvas.addEventListener('touchstart',onDown,{passive:false});
        window.addEventListener('touchmove',onMove,{passive:false});
        window.addEventListener('touchend',onUp);

        // ---------- ui ----------
        MATERIALS.forEach(mat=>{
            const btn=document.createElement('button');
            btn.textContent=mat.label; btn.style.background=mat.css; btn.style.color='#1a1a1a';
            if (mat.id===EMPTY) btn.style.color='#fff';
            btn.dataset.id=mat.id;
            if (mat.id===current) btn.classList.add('active');
            btn.addEventListener('click',()=>{ current=mat.id; [...paletteEl.children].forEach(b=>b.classList.toggle('active',+b.dataset.id===mat.id)); });
            paletteEl.appendChild(btn);
        });
        document.getElementById('rainbow').addEventListener('change',e=>rainbow=e.target.checked);
        document.getElementById('hue').addEventListener('input',e=>hueVal=+e.target.value);
        document.getElementById('brush').addEventListener('input',e=>brush=+e.target.value);
        document.getElementById('mix').addEventListener('input',e=>mixAmt=+e.target.value/100);
        document.getElementById('drift').addEventListener('input',e=>driftAmt=+e.target.value/100);
        document.getElementById('slosh').addEventListener('input',e=>sloshAmt=+e.target.value/100);
        let paused=false;
        document.getElementById('pauseBtn').addEventListener('click',e=>{ paused=!paused; e.target.textContent=paused?'▶':'⏸'; });
        document.getElementById('clearBtn').addEventListener('click',()=>{ grid.fill(EMPTY); life.fill(0); });

        // ---------- loop ----------
        function loop(){
            if (!paused){
                drawHue=(drawHue+1.4)%256;
                simulate();
                blendColors();
                frame++;
            }
            if (painting) paint();
            render();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
