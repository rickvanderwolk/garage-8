<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kleurveld</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100vw; height: 100vh; overflow: hidden; background: #07060f; }
        #canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: block; touch-action: none; cursor: crosshair; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H, DPR, cx, cy;
        function resize() {
            DPR = Math.min(window.devicePixelRatio || 1, 2);
            W = window.innerWidth; H = window.innerHeight;
            canvas.width = W*DPR; canvas.height = H*DPR;
            canvas.style.width = W+'px'; canvas.style.height = H+'px';
            ctx.setTransform(DPR,0,0,DPR,0,0);
            cx = W/2; cy = H/2;
            ctx.fillStyle = '#07060f';
            ctx.fillRect(0,0,W,H);
        }
        resize();
        window.addEventListener('resize', resize);

        // ---------- deeltjes ----------
        const CAP = 6000;
        const px=new Float32Array(CAP), py=new Float32Array(CAP);
        const vx=new Float32Array(CAP), vy=new Float32Array(CAP);
        const ph=new Float32Array(CAP);      // hue 0..1
        let count=0, head=0;

        function spawn(x,y,ivx,ivy,hue){
            let i;
            if (count<CAP) i=count++; else { i=head; head=(head+1)%CAP; }
            px[i]=x; py[i]=y; vx[i]=ivx; vy[i]=ivy; ph[i]=hue;
        }

        // ---------- stromingsveld (curl-ruis) ----------
        function POT(x,y,t){
            const a=x*0.0021, b=y*0.0021;
            return Math.sin(a*1.3 + t*0.50)
                 + Math.cos(b*1.1 - t*0.40)
                 + 0.7*Math.sin((a+b)*0.9 + t*0.70)
                 + 0.5*Math.cos((a-b)*1.7 - t*0.30);
        }

        // ---------- kleur-palet dat traag verschuift ----------
        let paletteBase = Math.random();   // 0..1
        function hsl(h,s,l){
            h=((h%1)+1)%1;
            const c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs((h*6)%2-1)), m=l-c/2;
            let r,g,b;
            const seg=Math.floor(h*6)%6;
            if(seg===0){r=c;g=x;b=0;}else if(seg===1){r=x;g=c;b=0;}else if(seg===2){r=0;g=c;b=x;}
            else if(seg===3){r=0;g=x;b=c;}else if(seg===4){r=x;g=0;b=c;}else{r=c;g=0;b=x;}
            return [(r+m)*255,(g+m)*255,(b+m)*255];
        }

        // ---------- input ----------
        let down=false, lx=0, ly=0;
        function pos(e){ const t=e.touches?e.touches[0]:e; return {x:t.clientX,y:t.clientY}; }
        function emit(x,y,dvx,dvy){
            for (let k=0;k<10;k++){
                const a=Math.random()*Math.PI*2, r=Math.random()*14;
                spawn(x+Math.cos(a)*r, y+Math.sin(a)*r,
                      dvx*0.3+(Math.random()-0.5)*1.2, dvy*0.3+(Math.random()-0.5)*1.2,
                      paletteBase + (Math.random()-0.5)*0.12);
            }
        }
        function onDown(e){ down=true; const p=pos(e); lx=p.x; ly=p.y; paletteBase=(paletteBase+0.13+Math.random()*0.2)%1; emit(p.x,p.y,0,0); e.preventDefault(); }
        function onMove(e){ const p=pos(e); if(down){ emit(p.x,p.y,p.x-lx,p.y-ly); e.preventDefault(); } lx=p.x; ly=p.y; }
        function onUp(){ down=false; }
        canvas.addEventListener('mousedown',onDown);
        window.addEventListener('mousemove',onMove);
        window.addEventListener('mouseup',onUp);
        canvas.addEventListener('touchstart',onDown,{passive:false});
        window.addEventListener('touchmove',onMove,{passive:false});
        window.addEventListener('touchend',onUp);
        window.addEventListener('keydown',e=>{ if(e.key==='c'||e.key==='C'){ ctx.fillStyle='#07060f'; ctx.fillRect(0,0,W,H); count=0; head=0; } });

        // begin met wat leven
        for (let k=0;k<1600;k++) spawn(Math.random()*W, Math.random()*H, 0,0, Math.random());

        // ---------- loop ----------
        let tprev=performance.now();
        function loop(now){
            const t = now*0.001;
            // morphende krachten -> beweging blijft van karakter veranderen
            const gW = 0.5+0.5*Math.sin(t*0.13);          // zwaartekracht
            const sW = 0.5+0.5*Math.sin(t*0.09+2.0);      // werveling
            const cW = 0.6+0.4*Math.sin(t*0.17+1.0);      // curl-ruis
            const eW = Math.max(0, Math.sin(t*0.07+4.0))*0.7; // uitbarsting naar buiten
            const SPEED = 1.5 + 1.5*(0.5+0.5*Math.sin(t*0.10));
            const eps=6;

            // trail-fade
            ctx.globalCompositeOperation='source-over';
            ctx.fillStyle='rgba(7,6,15,0.085)';
            ctx.fillRect(0,0,W,H);

            ctx.globalCompositeOperation='lighter';
            const drift = t*0.02;
            const n = Math.min(count, CAP);
            for (let i=0;i<n;i++){
                let x=px[i], y=py[i];
                // curl van het potentieel (divergentievrij -> mooie wervels)
                const curlx = (POT(x,y+eps,t)-POT(x,y-eps,t));
                const curly = -(POT(x+eps,y,t)-POT(x-eps,y,t));
                // werveling rond het midden
                let swx=-(y-cy), swy=(x-cx); const sl=Math.hypot(swx,swy)||1; swx/=sl; swy/=sl;
                // naar buiten
                let ox=(x-cx), oy=(y-cy); const ol=Math.hypot(ox,oy)||1; ox/=ol; oy/=ol;

                let dx = cW*curlx*2.4 + sW*swx + eW*ox;
                let dy = cW*curly*2.4 + sW*swy + eW*oy + gW*1.0;
                const dl=Math.hypot(dx,dy)||1; dx/=dl; dy/=dl;

                vx[i] += (dx*SPEED - vx[i])*0.08;
                vy[i] += (dy*SPEED - vy[i])*0.08;
                x += vx[i]; y += vy[i];
                // wrap
                if (x<0)x+=W; else if(x>=W)x-=W;
                if (y<0)y+=H; else if(y>=H)y-=H;
                px[i]=x; py[i]=y;

                // kleur: eigen tint + drift + beetje stromingsrichting
                const ang = Math.atan2(vy[i],vx[i])/(Math.PI*2);
                const [r,g,b]=hsl(ph[i]+drift+ang*0.12, 0.72, 0.55);
                ctx.fillStyle='rgba('+(r|0)+','+(g|0)+','+(b|0)+',0.5)';
                ctx.beginPath();
                ctx.arc(x,y,1.9,0,Math.PI*2);
                ctx.fill();
            }
            ctx.globalCompositeOperation='source-over';

            // langzaam het palet laten verschuiven (kleurvariatie in de tijd)
            paletteBase=(paletteBase+0.0006)%1;

            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    </script>
</body>
</html>
